version: '3.8'

services:
  radar-webapp-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: capsule-radar-webapp-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
